<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ACCESS - DARPO-CS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-lg shadow-2xl overflow-hidden border-t-8 border-[#D4AF37]">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-[#003811] tracking-tighter uppercase">Secure Access</h2>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase mt-1">DAR Clearance Portal</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-[#003811] uppercase tracking-wider mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded focus:ring-2 focus:ring-[#003811] focus:outline-none font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-[#003811] uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded focus:ring-2 focus:ring-[#003811] focus:outline-none font-bold">
                </div>
                
                <p id="errorMessage" class="text-red-600 text-[10px] font-bold hidden text-center uppercase">Authentication failed. Check credentials.</p>

                <button type="submit" id="loginBtn" class="w-full bg-[#003811] text-white py-4 rounded font-black text-sm hover:bg-[#005c1c] transition-all shadow-lg active:scale-95 uppercase tracking-widest">
                    Log In
                </button>
            </form>
        </div>
        <div class="bg-gray-50 p-4 text-center border-t">
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">Dept. of Agrarian Reform - Camarines Sur</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tqeueibigqwxcizhvdty.supabase.co';
        const supabaseKey = 'sb_publishable_oXBtC1VgBlO07oEmqpcFpw_gBtVMpvT';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMessage');
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            err.classList.add('hidden');

            try {
                // Check Users table for match
                const { data, error } = await supabase
                    .from('Users')
                    .select('*')
                    .eq('username', userVal)
                    .eq('password', passVal)
                    .single();

                if (error || !data) throw new Error("Invalid login");

                // Store session and redirect [cite: 2026-02-14]
                sessionStorage.setItem('currentUser', JSON.stringify(data));
                window.location.href = 'dashboard.html';

            } catch (fail) {
                err.classList.remove('hidden');
                btn.innerText = "LOG IN";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
