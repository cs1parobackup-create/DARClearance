<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DARPO-CS Clearance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        if (sessionStorage.getItem('currentUser')) { window.location.href = 'dashboard.html'; }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-lg shadow-2xl overflow-hidden border-t-8 border-[#D4AF37]">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-[#003811] tracking-tighter uppercase">Secure Access</h2>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase mt-1 font-sans">DAR Clearance Portal</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-[#003811] uppercase tracking-wider mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded focus:ring-2 focus:ring-[#003811] focus:outline-none font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-[#003811] uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded focus:ring-2 focus:ring-[#003811] focus:outline-none font-bold">
                </div>
                <p id="errorMessage" class="text-red-600 text-[10px] font-bold hidden text-center uppercase">Invalid Username or Password.</p>
                <button type="submit" id="loginBtn" class="w-full bg-[#003811] text-white py-4 rounded font-black text-sm hover:bg-[#005c1c] transition-all shadow-lg active:scale-95 uppercase tracking-widest">Log In</button>
            </form>
        </div>
        <div class="bg-gray-50 p-4 text-center border-t text-[9px] text-gray-400 font-bold uppercase">Dept. of Agrarian Reform - Camarines Sur</div>
    </div>
    <script>
        // SHA-256 Hashing function (matches users.html)
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMessage');
            
            btn.innerText = "VERIFYING..."; 
            btn.disabled = true; 
            err.classList.add('hidden');
            
            try {
                const inputUser = document.getElementById('username').value.trim();
                const plainPass = document.getElementById('password').value.trim();
                
                // Hash the inputted password for secure comparison
                const hashedPass = await hashPassword(plainPass);

                // 1. Try logging in with the secure HASHED password first
                let { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', inputUser)
                    .eq('password', hashedPass)
                    .maybeSingle();

                // 2. FALLBACK: If hash fails, try the plain-text password for unmigrated accounts
                if (!data) {
                    const fallback = await supabaseClient
                        .from('users')
                        .select('*')
                        .eq('username', inputUser)
                        .eq('password', plainPass)
                        .maybeSingle();
                    
                    data = fallback.data;
                }

                if (!data || data.is_active === false || data.is_active === 'FALSE') {
                    throw new Error("Invalid Username, Password, or Account Disabled.");
                }

                // Success
                sessionStorage.setItem('currentUser', JSON.stringify(data));
                window.location.href = 'dashboard.html';
                
            } catch (fail) {
                err.innerText = fail.message; 
                err.classList.remove('hidden'); 
                btn.innerText = "LOG IN"; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
