<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DAR AI Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.3/dist/index.min.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-[#003811]">
        <h1 class="text-2xl font-black text-[#003811] uppercase mb-4">Affidavit AI Extractor</h1>
        
        <input type="file" id="file" accept="image/*" class="w-full p-4 border-2 border-dashed rounded mb-4">
        <button id="btn-extract" onclick="extract()" class="w-full bg-[#003811] text-white py-4 font-bold rounded shadow hover:bg-green-900 transition">EXTRACT DATA</button>

        <div id="loader" class="hidden text-center py-10 font-bold text-[#003811]">Processing...</div>

        <div id="form-container" class="hidden mt-8">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Review & Edit Extracted Data</h2>
            <div id="fields" class="grid grid-cols-2 gap-4 text-xs"></div>
            <button onclick="save()" class="w-full mt-6 bg-[#D4AF37] text-[#003811] py-4 font-black rounded shadow hover:bg-yellow-500 transition">CONFIRM & SAVE TO DATABASE</button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient("YOUR_URL", "YOUR_KEY");
        const genAI = new window.GoogleGenerativeAI("AQ.Ab8RN6KNylqlIovrOTx5niUx5Iznwcmx7O6-Y854EaKkj6VA3g");

        const fields = ['lot_no', 'owner_name', 'registered_under', 'area', 'td_no', 'location', 'deed_type', 'executed_by', 'in_favor_of', 'doc_no', 'page_no', 'book_no', 'series_of', 'dated', 'notary_public', 'retention_area_n'];
        let extractedData = {};

        async function extract() {
            const file = document.getElementById('file').files[0];
            if(!file) return alert("Select a file.");
            
            document.getElementById('loader').classList.remove('hidden');
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const base64Data = reader.result.split(',')[1];
                
                const prompt = `Extract these fields from this affidavit: ${fields.join(', ')}. Return pure JSON only.`;
                const result = await model.generateContent([prompt, { inlineData: { data: base64Data, mimeType: file.type } }]);
                
                extractedData = JSON.parse(result.response.text().replace(/```json|```/g, ''));
                
                // Show form
                const container = document.getElementById('fields');
                container.innerHTML = fields.map(f => `
                    <div>
                        <label class="block font-bold text-[10px] uppercase text-gray-500">${f}</label>
                        <input id="${f}" value="${extractedData[f] || ''}" class="w-full border p-2 rounded">
                    </div>
                `).join('');
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('form-container').classList.remove('hidden');
            };
        }

        async function save() {
            const payload = { status: 'RECEIVED', is_ai_extracted: true };
            fields.forEach(f => payload[f] = document.getElementById(f).value);
            
            const { error } = await supabase.from('land_records').insert([payload]);
            if(error) alert("Error: " + error.message);
            else { alert("Saved!"); location.reload(); }
        }
    </script>
</body>
</html>
