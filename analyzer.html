<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DAR Scanner (GitHub Pages Ready)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tesseract.js directly from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-green-800">
        <h1 class="text-xl font-black text-green-900 mb-4">FREE DOCUMENT SCANNER</h1>
        
        <input type="file" id="file" class="w-full p-4 border rounded mb-4">
        <button onclick="scanDocument()" id="btn" class="w-full bg-green-900 text-white py-3 rounded font-bold">SCAN DOCUMENT</button>

        <div id="loader" class="hidden text-center py-10 font-bold text-green-800">Processing locally...</div>

        <!-- This form is what you will use to save to Supabase -->
        <div id="form-fields" class="mt-6 hidden grid grid-cols-2 gap-4">
            <div><label class="text-[10px] font-bold">LOT NO</label><input id="lot_no" class="w-full border p-2"></div>
            <div><label class="text-[10px] font-bold">OWNER</label><input id="owner_name" class="w-full border p-2"></div>
            <button onclick="saveToSupabase()" class="col-span-2 bg-yellow-600 py-3 text-white font-bold rounded">SAVE TO DATABASE</button>
        </div>
    </div>

    <script>
        async function scanDocument() {
            const file = document.getElementById('file').files[0];
            document.getElementById('loader').classList.remove('hidden');

            const { data: { text } } = await Tesseract.recognize(file, 'eng');
            
            // Basic logic: If you can't have AI, we manually pull the text
            // You can refine this by searching the 'text' variable for keywords
            alert("Scan Complete! Look at the console to see full text.");
            console.log(text); 
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('form-fields').classList.remove('hidden');
        }
    </script>
</body>
</html>
