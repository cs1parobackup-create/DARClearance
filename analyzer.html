<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DAR Scanner (PDF & Image)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tesseract para sa OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- PDF.js para mabasa ang PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-green-800">
        <h1 class="text-xl font-black text-green-900 mb-4 uppercase">DAR PDF & Image Scanner</h1>
        
        <input type="file" id="fileInput" accept="image/*,application/pdf" class="w-full p-4 border-2 border-dashed rounded mb-4">
        <button onclick="processFile()" id="scanBtn" class="w-full bg-green-900 text-white py-3 rounded font-bold hover:bg-green-700">SCAN PDF/IMAGE (FREE)</button>

        <div id="resultArea" class="mt-6 hidden">
            <textarea id="outputText" class="w-full h-60 p-4 border rounded text-xs" readonly></textarea>
        </div>
    </div>
<script>
    // Idagdag mo ito sa loob ng <script> tag mo
    function analyzeSimpleData() {
        const fullText = document.getElementById('outputText').value;
        
        // Simple analysis: Hahanap siya ng mga pattern (keywords)
        // Halimbawa: Hahanap ng text pagkatapos ng "Lot No."
        const lotMatch = fullText.match(/Lot No\.?\s*([0-9\-A-Z]+)/i);
        const areaMatch = fullText.match(/Area\s*([0-9\.]+\s*(sq\.?m\.?|hectares))/i);
        
        // I-fill ang mga box base sa nahanap
        if (lotMatch) document.getElementById('lot_no').value = lotMatch[1];
        if (areaMatch) document.getElementById('area').value = areaMatch[1];
        
        alert("Simple analysis complete! Check the fields.");
    }
</script>

<button onclick="analyzeSimpleData()" class="mt-2 w-full bg-blue-600 text-white py-2 rounded font-bold">
    AUTO-ANALYZE FIELDS
</button>
    <script>
        async function processFile() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Pumili ng file.");
            
            const btn = document.getElementById('scanBtn');
            btn.innerText = "Processing...";
            
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    // Logic para sa PDF
                    const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                    const page = await pdf.getPage(1); // Unang page lang muna
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                    const { data: { text: ocrText } } = await Tesseract.recognize(canvas, 'eng');
                    text = ocrText;
                } else {
                    // Logic para sa Image
                    const { data: { text: ocrText } } = await Tesseract.recognize(file, 'eng');
                    text = ocrText;
                }
                document.getElementById('outputText').value = text;
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.innerText = "SCAN PDF/IMAGE (FREE)";
            }
        }
    </script>
</body>
</html>
