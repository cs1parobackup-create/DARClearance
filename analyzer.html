<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DAR AI Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-[#003811]">
        <h1 class="text-2xl font-black text-[#003811] uppercase mb-4">Affidavit AI Extractor</h1>
        
        <input type="file" id="file" accept="image/*,application/pdf" class="w-full p-4 border-2 border-dashed border-gray-300 rounded mb-4 cursor-pointer">
        <button id="btn-extract" onclick="window.extract()" class="w-full bg-[#003811] text-white py-4 font-bold rounded shadow hover:bg-green-900 transition uppercase tracking-wider">Extract Data with AI</button>

        <div id="loader" class="hidden text-center py-10 font-bold text-[#003811] animate-pulse">Processing Document... Please wait.</div>

        <div id="form-container" class="hidden mt-8">
            <h2 class="text-lg font-bold mb-4 border-b pb-2 text-[#003811]">Review & Edit Extracted Data</h2>
            <div id="fields" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs"></div>
            
            <div class="mt-8 flex gap-4 border-t pt-6">
                <button onclick="window.resetPage()" class="w-1/3 bg-gray-200 text-gray-800 font-bold py-3 rounded uppercase hover:bg-gray-300 transition">Discard</button>
                <button onclick="window.saveToDB()" class="w-2/3 bg-[#D4AF37] text-[#003811] font-black py-3 rounded uppercase shadow hover:bg-yellow-500 transition">Confirm & Save to Records</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // 1. SUPABASE CONNECTION (Using the URL and KEY you provided earlier)
        const supabaseUrl = 'https://tqeueibigqwxcizhvdty.supabase.co';
        const supabaseKey = 'sb_publishable_oXBtC1VgBlO07oEmqpcFpw_gBtVMpvT';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. GOOGLE GEMINI CONNECTION (Using the key from your screenshot)
        const GEMINI_API_KEY = "AIzaSyC...VA3g"; // Note: Using the end from your screenshot, you must replace this string with your full copied key.
        const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);

        const fields = ['lot_no', 'owner_name', 'registered_under', 'area', 'td_no', 'location', 'deed_type', 'executed_by', 'in_favor_of', 'doc_no', 'page_no', 'book_no', 'series_of', 'dated', 'notary_public', 'retention_area_n'];
        let extractedData = {};

        window.extract = async function() {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if(!file) return alert("Select a file first.");
            
            // Check if user actually pasted the full key
            if(GEMINI_API_KEY.includes("...")) {
                return alert("ERROR: You must paste the FULL Gemini API key into the code on line 43. I could only see the last 4 digits in your screenshot!");
            }

            document.getElementById('btn-extract').disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('form-container').classList.add('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                try {
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const base64Data = reader.result.split(',')[1];
                    
                    const prompt = `
                        You are an expert legal document parser for the Department of Agrarian Reform.
                        Analyze the attached document.
                        Extract these fields exactly as they appear: ${fields.join(', ')}. 
                        Respond ONLY with a raw JSON object containing these exact keys. 
                        Do not include markdown formatting like \`\`\`json. 
                        If a field is missing, leave it as an empty string "".
                    `;
                    
                    const result = await model.generateContent([
                        prompt, 
                        { inlineData: { data: base64Data, mimeType: file.type } }
                    ]);
                    
                    let aiText = result.response.text();
                    aiText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    extractedData = JSON.parse(aiText);
                    
                    const container = document.getElementById('fields');
                    container.innerHTML = fields.map(f => `
                        <div>
                            <label class="block font-bold text-[10px] uppercase text-gray-500 mb-1">${f.replace(/_/g, ' ')}</label>
                            <input id="${f}" value="${(extractedData[f] || '').replace(/"/g, '&quot;')}" class="w-full border p-2.5 rounded focus:border-[#003811] focus:ring-1 focus:ring-[#003811] focus:outline-none text-sm font-semibold">
                        </div>
                    `).join('');
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('form-container').classList.remove('hidden');
                } catch (error) {
                    alert("AI Extraction Error: " + error.message);
                    console.error(error);
                    document.getElementById('loader').classList.add('hidden');
                } finally {
                    document.getElementById('btn-extract').disabled = false;
                }
            };
        }

        window.saveToDB = async function() {
            const btn = document.querySelector('button[onclick="window.saveToDB()"]');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const payload = { status: 'RECEIVED', is_ai_extracted: true };
            fields.forEach(f => {
                payload[f] = document.getElementById(f).value.trim();
            });
            
            const { error } = await supabase.from('land_records').insert([payload]);
            
            if(error) {
                alert("Database Error: " + error.message);
                btn.innerText = "Confirm & Save to Records";
                btn.disabled = false;
            } else { 
                alert("Record successfully saved to database!"); 
                window.location.href = 'index.html'; // Go back to dashboard
            }
        }

        window.resetPage = function() {
            document.getElementById('file').value = '';
            document.getElementById('form-container').classList.add('hidden');
        }
    </script>
</body>
</html>
