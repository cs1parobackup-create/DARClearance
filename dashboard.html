<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DAR Clearance Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #F3F4F6; }
        .sidebar { background-color: var(--dar-green); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">
    <nav class="sidebar md:w-64 flex flex-col text-white flex-shrink-0 shadow-xl z-20">
        <div class="p-6 border-b border-[#006400]">
            <h2 class="text-xl font-bold text-[#D4AF37]">DARPO-CS</h2>
            <p id="userRoleBadge" class="text-[10px] text-gray-300 uppercase tracking-widest mt-1 font-bold">---</p>
        </div>
        <div id="dynamicMenu" class="flex-1 overflow-y-auto py-2"></div>
        <div class="p-4 bg-black/20 text-xs font-bold">
            <p id="activeUser" class="text-gray-300 truncate mb-2"></p>
            <button onclick="logout()" class="w-full bg-red-800 py-2 rounded shadow hover:bg-red-700 transition-colors uppercase">Logout</button>
        </div>
    </nav>
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm border-b px-8 py-4 flex justify-between items-center">
            <h1 class="text-lg font-bold text-[#003811] uppercase">Clearance Monitor</h1>
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Search Lot/Owner..." class="border rounded px-3 py-1 text-sm focus:outline-none" onkeyup="refreshDashboard()">
                <button onclick="fetchClearanceData()" class="bg-[#003811] text-white px-4 py-1 rounded text-sm font-bold uppercase">Refresh</button>
            </div>
        </header>
        
        <div class="flex-1 overflow-y-auto p-8 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-blue-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Received (Legal)</p>
                    <h3 id="stat-received-legal" class="text-lg font-black text-blue-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-purple-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Reviewed</p>
                    <h3 id="stat-reviewed" class="text-lg font-black text-purple-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-cyan-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Processed</p>
                    <h3 id="stat-processed" class="text-lg font-black text-cyan-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-orange-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">For Sign (PARPO)</p>
                    <h3 id="stat-signature" class="text-lg font-black text-orange-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-red-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Returned (Legal)</p>
                    <h3 id="stat-returned-legal" class="text-lg font-black text-red-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-green-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Forwarded (Rec)</p>
                    <h3 id="stat-forwarded" class="text-lg font-black text-green-600">0</h3>
                </div>
                <div class="bg-white p-3 rounded shadow-sm border-l-4 border-teal-500 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Released (Client)</p>
                    <h3 id="stat-released" class="text-lg font-black text-teal-600">0</h3>
                </div>
            </div>

            <div class="bg-white rounded shadow-sm overflow-hidden border">
                <table class="w-full text-left border-collapse text-xs">
                    <thead class="bg-gray-50 border-b">
                        <tr class="font-bold text-[#003811] uppercase tracking-wider">
                            <th class="px-6 py-4">Lot Details</th>
                            <th class="px-6 py-4">Owner Name</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Updated (12H)</th>
                        </tr>
                    </thead>
                    <tbody id="clearanceTableBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        const userData = sessionStorage.getItem('currentUser');
        if (!userData) { window.location.href = 'index.html'; }
        const currentUser = JSON.parse(userData);
        document.getElementById('activeUser').innerText = currentUser.full_name;
        document.getElementById('userRoleBadge').innerText = currentUser.role;

        async function loadMenu() {
            const { data: menuItems, error } = await supabaseClient.from('clearance_menu').select('*').eq('is_active', true).order('sort_order', { ascending: true });
            if (error) return;
            const menuContainer = document.getElementById('dynamicMenu');
            menuContainer.innerHTML = '';
            menuItems.forEach(item => {
                if (item.required_roles.includes(currentUser.role.toUpperCase()) || item.required_roles.length === 0) {
                    const isCurrent = window.location.pathname.includes(item.url);
                    menuContainer.innerHTML += `<a href="${item.url}" class="block px-6 py-4 text-[11px] font-black uppercase border-l-4 transition-all ${isCurrent ? 'bg-[#006400] border-[#D4AF37]' : 'border-transparent hover:bg-[#006400]'}">${item.label}</a>`;
                }
            });
        }

        // Exact mapping for 7 stages
        const statusColors = { 
            'RECEIVED - Legal': 'bg-blue-100 text-blue-800', 
            'REVIEWED': 'bg-purple-100 text-purple-800', 
            'PROCESSED': 'bg-cyan-100 text-cyan-800', 
            'FOR SIGNATURE - PARPO II': 'bg-orange-100 text-orange-800', 
            'RETURNED - Legal': 'bg-red-100 text-red-800', 
            'FORWARDED - Records': 'bg-green-100 text-green-800', 
            'RELEASED - Client': 'bg-teal-100 text-teal-800' 
        };

        let rawData = [];
        async function fetchClearanceData() {
            const { data, error } = await supabaseClient.from('land_records').select('*').order('updated_at', { ascending: false });
            if (!error) { rawData = data || []; refreshDashboard(); }
        }

        function refreshDashboard() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('clearanceTableBody');
            tbody.innerHTML = '';
            
            // Reset 7 stage counters
            let stats = { rl: 0, rev: 0, pro: 0, sig: 0, rtl: 0, fwd: 0, rel: 0 };
            
            rawData.forEach(item => {
                if ((item.lot_no || '').toLowerCase().includes(query) || (item.owner_name || '').toLowerCase().includes(query)) {
                    const status = item.status || 'RECEIVED - Legal';
                    
                    // Logic to count each specific stage
                    if (status === 'RECEIVED - Legal') stats.rl++; 
                    else if (status === 'REVIEWED') stats.rev++; 
                    else if (status === 'PROCESSED') stats.pro++; 
                    else if (status === 'FOR SIGNATURE - PARPO II') stats.sig++; 
                    else if (status === 'RETURNED - Legal') stats.rtl++; 
                    else if (status === 'FORWARDED - Records') stats.fwd++; 
                    else if (status === 'RELEASED - Client') stats.rel++;

                    // 12-hour format display [cite: 2026-02-15]
                    const updated = item.updated_at ? new Date(item.updated_at).toLocaleString('en-US', { hour12: true }) : '---';
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 font-bold">${item.lot_no}</td>
                            <td class="px-6 py-4 whitespace-pre-wrap">${item.owner_name}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${statusColors[status] || 'bg-gray-100'}">
                                    ${status}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right font-mono text-gray-400">${updated}</td>
                        </tr>`;
                }
            });

            // Update 7 Counter IDs
            document.getElementById('stat-received-legal').innerText = stats.rl;
            document.getElementById('stat-reviewed').innerText = stats.rev;
            document.getElementById('stat-processed').innerText = stats.pro;
            document.getElementById('stat-signature').innerText = stats.sig;
            document.getElementById('stat-returned-legal').innerText = stats.rtl;
            document.getElementById('stat-forwarded').innerText = stats.fwd;
            document.getElementById('stat-released').innerText = stats.rel;
        }

        function logout() { sessionStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        window.onload = () => { loadMenu(); fetchClearanceData(); };
    </script>
</body>
</html>
